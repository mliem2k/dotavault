services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dotavault
      POSTGRES_PASSWORD: dotavault_dev
      POSTGRES_DB: dotavault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dotavault -d dotavault"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
