name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: apps/replay-parser/go.sum

      - name: Build replay-parser (Go)
        run: cd apps/replay-parser && go build ./...

      - name: Install Turso CLI
        run: |
          curl -sSfL https://get.tur.so/install.sh | bash
          echo "$HOME/.turso" >> "$GITHUB_PATH"

      - name: Create Turso CI database
        id: create-db
        env:
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
        # Named ci-<run_id>-<attempt>, matching test-safety.ts's disposable-db
        # allowlist (^libsql://ci-) so the app's own safety guard permits it.
        run: |
          set -euo pipefail
          db_name="ci-${{ github.run_id }}-${{ github.run_attempt }}"
          turso db create "$db_name" --wait
          db_url=$(turso db show "$db_name" | awk '/^URL:/ { print $2 }')
          db_token=$(turso db tokens create "$db_name")
          echo "db_name=$db_name" >> "$GITHUB_OUTPUT"
          echo "db_url=$db_url" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$db_token"
          echo "db_token=$db_token" >> "$GITHUB_OUTPUT"

      - name: Push schema to Turso CI database
        env:
          TURSO_DATABASE_URL: ${{ steps.create-db.outputs.db_url }}
          TURSO_AUTH_TOKEN: ${{ steps.create-db.outputs.db_token }}
        run: cd apps/api && bunx drizzle-kit push --force

      - name: Run API tests
        env:
          TURSO_DATABASE_URL: ${{ steps.create-db.outputs.db_url }}
          TURSO_AUTH_TOKEN: ${{ steps.create-db.outputs.db_token }}
        # --timeout: CI's per-run ephemeral Turso database has shown enough
        # latency variance to trip bun:test's 5000ms default on ordinary
        # cacheGet/cacheSet round-trips, not just slow logic.
        run: cd apps/api && bun test --timeout=15000

      - name: Run web tests
        run: cd apps/web && bun test

      - name: Build API
        env:
          TURSO_DATABASE_URL: ${{ steps.create-db.outputs.db_url }}
          TURSO_AUTH_TOKEN: ${{ steps.create-db.outputs.db_token }}
        run: cd apps/api && bun run build

      - name: Build web
        run: cd apps/web && bun run build

      - name: Delete Turso CI database
        if: always() && steps.create-db.outputs.db_name != ''
        env:
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
        run: turso db destroy "${{ steps.create-db.outputs.db_name }}" --yes

  deploy:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: cd apps/web && bun run build
      - name: Deploy to Cloudflare Pages
        # Run from apps/web so Wrangler picks up apps/web/functions (the /df proxy)
        run: cd apps/web && npx wrangler pages deploy dist --project-name=dotavault --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
