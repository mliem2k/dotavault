name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: apps/replay-parser/go.sum

      - name: Build replay-parser (Go)
        run: cd apps/replay-parser && go build ./...

      - name: Create Neon branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: icy-grass-85986797
          parent_branch: production
          branch_name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          database: dotavault
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Push schema to Neon branch
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: cd apps/api && bunx drizzle-kit push --force

      - name: Run API tests
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: cd apps/api && bun test

      - name: Run web tests
        run: cd apps/web && bun test

      - name: Build API
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: cd apps/api && bun run build

      - name: Build web
        run: cd apps/web && bun run build

      - name: Delete Neon branch
        if: always() && steps.create-branch.outputs.branch_id != ''
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: icy-grass-85986797
          branch: ${{ steps.create-branch.outputs.branch_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

  deploy:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: cd apps/web && bun run build
      - name: Deploy to Cloudflare Pages
        # Run from apps/web so Wrangler picks up apps/web/functions (the /df proxy)
        run: cd apps/web && npx wrangler pages deploy dist --project-name=dotavault --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
