name: Neon branch cleanup

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Safety net for CI branches a run's own "Delete Neon branch" step failed to
      # clean up (e.g. a hard-cancelled/crashed run). Anything named ci-* and older
      # than 6h is well past a normal CI run's lifetime, so it's safe to delete.
      - name: Delete stale CI branches
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          set -euo pipefail
          project_id=icy-grass-85986797
          cutoff=$(date -u -d '6 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          bunx neonctl@latest branches list --project-id "$project_id" --api-key "$NEON_API_KEY" --output json \
            | jq -r --arg cutoff "$cutoff" \
              '.[] | select(.name | startswith("ci-")) | select(.created_at < $cutoff) | .id' \
            | while read -r id; do
                echo "Deleting stale branch $id"
                bunx neonctl@latest branches delete "$id" --project-id "$project_id" --api-key "$NEON_API_KEY" --output json
              done
