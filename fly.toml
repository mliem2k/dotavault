app = 'dotavault-api'
primary_region = 'sin'

[build]
  # Single image: Bun/Elysia API (public, port 3000) + the Go replay-parser
  # binary it spawns as a subprocess for /replay cache misses.
  dockerfile = 'apps/api/Dockerfile'

[env]
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  timeout = '5s'
  tls_skip_verify = false

[[vm]]
  # Replay parse jobs briefly hold manta's full entity state plus the
  # decompression stream; 512mb was fine for the API alone but not for that.
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
